# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "stockhawk-v2"

[setup]
script = '''
set -euo pipefail

SOURCE_ROOT="/Users/justinsingh/Documents/stockhawk v2"
TARGET_ROOT="${CODEX_WORKTREE_PATH:-$PWD}"

cd "$TARGET_ROOT"

update_to_selected_base_upstream() {
  starting_commit="$(git rev-parse HEAD)"
  base_upstreams="$(
    git for-each-ref --points-at "$starting_commit" \
      --format="%(upstream:short)" refs/heads |
      awk 'NF' |
      while IFS= read -r upstream; do
        if git show-ref --verify --quiet "refs/remotes/$upstream"; then
          printf "%s\n" "$upstream"
        fi
      done |
      sort -u
  )"
  base_upstream_count="$(
    printf "%s\n" "$base_upstreams" |
      awk 'NF { count++ } END { print count + 0 }'
  )"

  if [ "$base_upstream_count" -eq 0 ]; then
    echo "No remote-tracking upstream found for the selected base; using $starting_commit."
    return 0
  fi

  if [ "$base_upstream_count" -ne 1 ]; then
    echo "Cannot uniquely identify the selected base upstream:" >&2
    printf "%s\n" "$base_upstreams" >&2
    return 1
  fi

  base_upstream="$base_upstreams"
  remote="${base_upstream%%/*}"

  if [ "$remote" = "$base_upstream" ]; then
    echo "Selected base upstream '$base_upstream' is not remote-tracking; using $starting_commit."
    return 0
  fi

  echo "Fetching latest selected base from $base_upstream..."
  git fetch --prune "$remote"

  if git merge-base --is-ancestor "$starting_commit" "$base_upstream"; then
    git merge --ff-only "$base_upstream"
  elif git merge-base --is-ancestor "$base_upstream" "$starting_commit"; then
    echo "Selected base already contains the latest $base_upstream."
  else
    echo "Selected base and $base_upstream have diverged; refusing to overwrite either history." >&2
    return 1
  fi
}

update_to_selected_base_upstream

for env_file in ".env" ".env.local"; do
  if [ -f "$SOURCE_ROOT/$env_file" ]; then
    cp "$SOURCE_ROOT/$env_file" "$TARGET_ROOT/$env_file"
  fi
done

if [ -f "package.json" ]; then
  node -e 'const [major, minor] = process.versions.node.split(".").map(Number); if (major !== 24 || minor < 11) { console.error(`Node >=24.11 <25 is required; found ${process.version}`); process.exit(1); }'

  if [ -f "pnpm-lock.yaml" ]; then
    COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack pnpm install --frozen-lockfile
  else
    COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack pnpm install
  fi
else
  echo "No package.json on the selected base; skipping dependency installation."
fi
'''
